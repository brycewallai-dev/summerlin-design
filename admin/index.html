<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Admin | Summerlin Design</title>
</head>
<body>
  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"></script>
  <script>
  CMS.init({
    config: {
      backend: {
        name: 'github',
        repo: 'brycewallai-dev/summerlin-design',
        branch: 'master',
        base_url: 'https://summerlin-design.vercel.app',
        auth_endpoint: '/api/auth',
      },
      media_folder: 'images',
      public_folder: '/images',
      collections: [
        // ── Portfolio Gallery — add new photos ──────────────────
        {
          name: 'gallery',
          label: 'Portfolio Gallery',
          files: [
            {
              name: 'additions',
              label: 'Add Gallery Photos',
              file: 'data/gallery-additions.json',
              fields: [
                {
                  name: 'images',
                  label: 'Photos',
                  label_singular: 'Photo',
                  widget: 'list',
                  summary: '{{fields.src}}',
                  fields: [
                    {
                      label: 'Photo', name: 'src', widget: 'image',
                      media_folder: '/images/gallery-additions',
                      public_folder: '/images/gallery-additions',
                      hint: 'Upload a photo — it will appear at the top of the portfolio grid.',
                    },
                  ],
                },
              ],
            },
          ],
        },
        // ── Portfolio Projects (CMS-managed per category) ───────
        {
          name: 'portfolio',
          label: 'Portfolio Projects',
          files: [
            {
              name: 'projects',
              label: 'Projects by Category',
              file: 'data/portfolio.json',
              fields: [
                {
                  name: 'projects',
                  label: 'Projects',
                  label_singular: 'Project',
                  widget: 'list',
                  summary: '{{fields.title}} — {{fields.category}}',
                  fields: [
                    { label: 'Project Name', name: 'title', widget: 'string' },
                    {
                      label: 'Category', name: 'category', widget: 'select',
                      options: ['Residential', 'Corporate Offices', 'Medical & Dental', 'Hospitality', 'Developer & Multi-Unit'],
                    },
                    { label: 'Location', name: 'location', widget: 'string', required: false, hint: 'e.g. Ladera Ranch' },
                    { label: 'Short Description', name: 'description', widget: 'text', required: false },
                    {
                      label: 'Photo', name: 'image', widget: 'image',
                      media_folder: '/images/portfolio',
                      public_folder: '/images/portfolio',
                    },
                  ],
                },
              ],
            },
          ],
        },
        // ── Site Photos ─────────────────────────────────────────
        {
          name: 'site_images',
          label: 'Site Photos',
          files: [
            {
              name: 'hero',
              label: 'Homepage — Hero Photo',
              file: 'data/hero.json',
              fields: [
                {
                  label: 'Hero Photo', name: 'src', widget: 'image',
                  media_folder: '/images/hero',
                  public_folder: '/images/hero',
                },
              ],
            },
            {
              name: 'about',
              label: "About Page — Leslie's Portrait",
              file: 'data/about.json',
              fields: [
                {
                  label: 'Portrait Photo', name: 'src', widget: 'image',
                  media_folder: '/images/about',
                  public_folder: '/images/about',
                },
              ],
            },
            {
              name: 'residential',
              label: 'Residential Page Photos',
              file: 'data/residential.json',
              fields: [
                { label: 'Hero Photo (full-bleed)', name: 'hero', widget: 'image', required: false, media_folder: '/images/residential', public_folder: '/images/residential', hint: 'Full-viewport hero — wide landscape, 1920×1080 min.' },
                { label: 'Approach Section Photo', name: 'approach', widget: 'image', required: false, media_folder: '/images/residential', public_folder: '/images/residential', hint: '4:3 ratio alongside the "how we work" copy.' },
                { label: '"Room by Room" Card Photo', name: 'single_room', widget: 'image', required: false, media_folder: '/images/residential', public_folder: '/images/residential' },
                { label: '"Kitchen & Bath" Card Photo', name: 'kitchen_bath', widget: 'image', required: false, media_folder: '/images/residential', public_folder: '/images/residential' },
                { label: '"Full-Home Design" Card Photo', name: 'full_home', widget: 'image', required: false, media_folder: '/images/residential', public_folder: '/images/residential' },
                { label: '"New Construction" Card Photo', name: 'new_build', widget: 'image', required: false, media_folder: '/images/residential', public_folder: '/images/residential' },
              ],
            },
            {
              name: 'commercial',
              label: 'Commercial Page Photos',
              file: 'data/commercial.json',
              fields: [
                { label: 'Hero Photo (full-bleed)', name: 'hero', widget: 'image', required: false, media_folder: '/images/commercial', public_folder: '/images/commercial', hint: 'Full-viewport hero — wide landscape, 1920×1080 min.' },
                { label: 'Problem Section Photo', name: 'office_detail', widget: 'image', required: false, media_folder: '/images/commercial', public_folder: '/images/commercial', hint: '4:3 ratio alongside the opening copy.' },
                { label: '"Corporate Office" Card Photo', name: 'offices', widget: 'image', required: false, media_folder: '/images/commercial', public_folder: '/images/commercial' },
                { label: '"Medical & Dental" Card Photo', name: 'medical', widget: 'image', required: false, media_folder: '/images/commercial', public_folder: '/images/commercial' },
                { label: '"Hospitality" Card Photo', name: 'hospitality', widget: 'image', required: false, media_folder: '/images/commercial', public_folder: '/images/commercial' },
                { label: '"Developers" Card Photo', name: 'developers', widget: 'image', required: false, media_folder: '/images/commercial', public_folder: '/images/commercial' },
              ],
            },
          ],
        },
      ],
    },
  });
  </script>
</body>
</html>
